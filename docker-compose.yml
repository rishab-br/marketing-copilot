# Local stack for the Agentic Digital Marketing Copilot backend.
#
# Usage:
#   1. cp .env.example .env   (and set GEMINI_API_KEY)
#   2. docker compose up --build
#   3. open http://localhost:8000/health  /  http://localhost:8000/docs
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    # .env is optional so the image still builds/runs without it; set
    # GEMINI_API_KEY there for real generation.
    env_file:
      - path: .env
        required: false
    environment:
      # Persist SQLite to the named volume instead of the container layer.
      DATABASE_URL: sqlite:///./data/marketing_copilot.db
    volumes:
      - copilot-data:/app/data

volumes:
  copilot-data:
