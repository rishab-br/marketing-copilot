# Fly.io deploy config for the backend.
#
# First time:
#   cd backend
#   fly launch --no-deploy        # pick a unique app name; it rewrites `app` below
#   fly volume create copilot_data --size 1
#   fly secrets set GEMINI_API_KEY=your-key
#   fly deploy
#
# The volume gives SQLite a persistent home; the container entrypoint chowns it
# to the non-root app user on boot.

app = "marketing-copilot-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_URL = "sqlite:///./data/marketing_copilot.db"
  LLM_PROVIDER = "gemini"
  LLM_MODEL = "gemini-2.0-flash"

[[mounts]]
  source = "copilot_data"
  destination = "/app/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"
